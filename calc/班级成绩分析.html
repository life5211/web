<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>成绩分析系统</title>
  <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
  <!--  <script src="dist/xlsx.core.min.js"></script>-->
  <!--  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>-->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.mini.min.js"></script>
  <!--  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.20.3/xlsx.core.min.js"></script>-->
  <!-- import Vue before Element -->
  <!--<script src="https://unpkg.com/vue@2/dist/vue.js"></script>-->
  <!-- 开发环境版本，包含了有帮助的命令行警告 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/vue/2.7.9/vue.js"></script>
  <!-- 生产环境版本，优化了尺寸和速度 -->
  <!--<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>-->
  <!--<script src="https://cdn.bootcdn.net/ajax/libs/vue/2.7.9/vue.min.js"></script>-->
  <!-- import JavaScript -->
  <script src="https://unpkg.com/element-ui/lib/index.js"></script>
</head>
<body>
<div id="root">
  <el-row>
    <el-upload
        class="upload-demo"
        ref="upload"
        action="#"
        :file-list="fileList"
        :on-change="handleFileChange"
        accept=".xls,.xlsx"
        :drag="true"
        :multiple="true"
        :auto-upload="false">
      <el-button slot="trigger" size="small" type="primary">选取文件</el-button>
      <el-button style="margin-left: 10px;" size="small" type="success" @click="submitUpload">导出汇总数据</el-button>
      <div slot="tip" class="el-upload__tip">只能上传.xls,.xlsx文件</div>
    </el-upload>
  </el-row>

  <h4>数据筛选项 （总数据量<{{allDataLen}}>）</h4>
  <el-row>
    <template v-for="(v, k) in keysObj">
      <el-checkbox v-model="v.checked">{{k}}<{{v.num}}></el-checkbox>
    </template>
  </el-row>

  <h4>文件列表<{{fileNames.length}}></h4>
  <el-row v-if="fileNames.length">
    <el-button v-for="(file,i) in fileNames"
               @click=fileIdx=i :key="file.name" :class="{'el-button--primary':i===fileIdx}"
    >{{file.name}}
    </el-button>
  </el-row>
  <h4>sheet列表<{{sheetNames.length}}></h4>
  <el-row v-if="sheetNames.length">
    <el-button v-for="(sheetName,i) in sheetNames"
               @click=sheetIdx=i :key="sheetName+i" :class="{'el-button--primary':i===sheetIdx}" round
    >{{sheetName}}
    </el-button>
  </el-row>

  <el-table
      :data="tableData"
      border
      style="width: 100%">
    <el-table-column v-for="(e) in tableCols"
                     :prop="e"
                     :label="e" :key="e"
                     sortable>
    </el-table-column>
  </el-table>
</div>
</body>

<script>
  function downloadTxt(fileName, content) {
    let blob = new Blob([content], {
      type: "text/plain;charset=utf-8"
    });
    let reader = new FileReader();
    reader.readAsDataURL(blob);
    reader.onload = function (e) {
      let a = document.createElement('a');
      a.download = fileName;
      a.href = e.target.result;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  }

  document.VVue = new Vue({
    el: '#root',
    data: {
      fileList: [],
      keysObj: {},
      allDataLen: 0,
      tableData: [],
      fileNames: [],
      sheetNames: [],
      fileIdx: -1,
      sheetIdx: 0,
      tableCols: []
    },
    methods: {
      submitUpload() {
        const innerHtml = "";
        downloadTxt(`查询网站.html`, innerHtml);
      },
      parseExcelData(wbs) {
        const jsonArr = wbs.map(wb =>
          wb.SheetNames.map(sheet =>
            XLSX.utils.sheet_to_csv(wb.Sheets[sheet]).split("\n").map(line => line.split(','))
          ));
        document.jsonArr = jsonArr;
      },
      async handleFileChange(file, fileList) {
        debugger;
        let wbs = [];
        let fileNames = [];
        for (const {raw} of fileList) {
          const wb = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsArrayBuffer(raw);
            reader.onload = e => resolve(XLSX.read(e.target.result, {type: 'binary', cellDates: true}));
          });
          fileNames.push({name: raw.name, sheetNames: wb.SheetNames});
          wbs.push(wb);
        }
        this.parseExcelData(wbs);
        document.wbs = wbs;
        this.fileNames = fileNames;
        this.fileIdx = -1;
        this.fileIdx = 0;
        //处理所有列表数据为json数组
        const jsonArr = wbs.map(wb => wb.SheetNames.map(sheet => XLSX.utils.sheet_to_json(wb.Sheets[sheet])).flatMap(e => e)).flatMap(e => e);
        this.allDataLen = jsonArr.length;
        const keysObj = {};
        jsonArr.map(json => Object.keys(json)).flatMap(e => e).forEach(k => {
          if (keysObj[k]) (keysObj[k]).num++;
          else keysObj[k] = {field: k, num: 1, checked: false};
        });
        this.keysObj = keysObj;
        // const keyArr = Object.keys(keysObj).map(k => ({field: k, num: keysObj[k], checked: false}));
        this.allSheetJson = JSON.stringify(jsonArr);
        this.allSheetJsonEncode = encodeURI(this.allSheetJson);
      },
      loadFileFn(fileIdx, sheetIdx) {
        fileIdx = fileIdx || this.fileIdx;
        sheetIdx = sheetIdx || 0;
        const sheetName = this.fileNames[fileIdx].sheetNames[sheetIdx];
        const sheetJson = XLSX.utils.sheet_to_json(document.wbs[fileIdx].Sheets[sheetName]);
        if (!sheetJson || !sheetJson.length) {
          return;
        }
        this.tableCols = Object.keys(sheetJson[0]);
        this.tableData = sheetJson;
      }

    }, watch: {
      fileIdx(index) {
        if (index < 0) return;
        this.sheetIdx = 0;
        this.sheetNames = this.fileNames[this.fileIdx].sheetNames
        this.loadFileFn(index);
      }, sheetIdx(index) {
        this.loadFileFn(0, index);
      }
    }
  });
</script>
</html>
